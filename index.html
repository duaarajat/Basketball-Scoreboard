<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div class="team-column">
                <h1><b>HOME</b></h1>
                <div class="score score-font" id="scoreHome-el">0</div>
                <div class="score-btn">
                    <button class="score-style" onclick="addOneToHome()">+1</button>
                    <button class="score-style" onclick="addTwoToHome()">+2</button>
                    <button class="score-style" onclick="addThreeToHome()">+3</button>
                </div>
            </div>
            
            <div class="team-column">
                <h1><b>GUEST</b></h1>
                <div class="score score-font" id="scoreGuest-el">0</div>
                <div class="score-btn">
                    <button class="score-style" onclick="addOneToGuest()">+1</button>
                    <button class="score-style" onclick="addTwoToGuest()">+2</button>
                    <button class="score-style" onclick="addThreeToGuest()">+3</button>
                </div>
            </div> 
        </div>

        <div class="new-game-btn"><button id="new-game" onclick="newGame()"><b>NEW GAME</b></button></div>
        
        <script src="index.js"></script>
    </body>
</html>
